version: '3.8'

name: ffengine-core

services:
  postgres:
    container_name: core-postgres
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow_password
      POSTGRES_DB: airflow
    ports:
      - "5436:5432"
    volumes:
      - airflow-pgdata:/var/lib/postgresql/data

  airflow-init:
    container_name: core-airflow-init
    build:
      context: ../
      dockerfile: docker/Dockerfile
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY:-ffengine_api_secret_key_dev}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_API_AUTH_JWT_SECRET:-ffengine_api_auth_jwt_secret_dev}
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@core-postgres:5432/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@core-postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    command: db migrate
    depends_on:
      - postgres

  airflow-webserver:
    container_name: core-airflow-webserver
    build:
      context: ../
      dockerfile: docker/Dockerfile
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY:-ffengine_api_secret_key_dev}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_API_AUTH_JWT_SECRET:-ffengine_api_auth_jwt_secret_dev}
      AIRFLOW__API__BASE_URL: http://core-airflow-webserver:8080
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://core-airflow-webserver:8080/execution/
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@core-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@core-postgres:5432/airflow
      AIRFLOW__CORE__PLUGINS_FOLDER: /opt/airflow/plugins
      AIRFLOW__CORE__TEST_CONNECTION: "Enabled"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    ports:
      - "8085:8080"
    volumes:
      - ../src:/opt/airflow/src
      - ../dags:/opt/airflow/dags
      - ../projects:/opt/airflow/projects
      - ../plugins:/opt/airflow/plugins
      - ../logs:/opt/airflow/logs
    command: >
      bash -lc "sed -i 's|^jwt_secret =.*|jwt_secret = ffengine_api_auth_jwt_secret_dev|' /opt/airflow/airflow.cfg && exec airflow api-server"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    container_name: core-airflow-scheduler
    build:
      context: ../
      dockerfile: docker/Dockerfile
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY:-ffengine_api_secret_key_dev}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_API_AUTH_JWT_SECRET:-ffengine_api_auth_jwt_secret_dev}
      AIRFLOW__API__BASE_URL: http://core-airflow-webserver:8080
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://core-airflow-webserver:8080/execution/
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@core-postgres:5432/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@core-postgres:5432/airflow
      AIRFLOW__CORE__PLUGINS_FOLDER: /opt/airflow/plugins
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__INTERNAL_API_URL: http://core-airflow-webserver:8080
      AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "30"
      AIRFLOW__DAG_PROCESSOR__REFRESH_INTERVAL: "30"
    volumes:
      - ../src:/opt/airflow/src
      - ../dags:/opt/airflow/dags
      - ../projects:/opt/airflow/projects
      - ../plugins:/opt/airflow/plugins
      - ../logs:/opt/airflow/logs
    command: >
      bash -lc "sed -i 's|^jwt_secret =.*|jwt_secret = ffengine_api_auth_jwt_secret_dev|' /opt/airflow/airflow.cfg && exec airflow scheduler"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    container_name: core-airflow-dag-processor
    build:
      context: ../
      dockerfile: docker/Dockerfile
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_API_SECRET_KEY:-ffengine_api_secret_key_dev}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_API_AUTH_JWT_SECRET:-ffengine_api_auth_jwt_secret_dev}
      AIRFLOW__API__BASE_URL: http://core-airflow-webserver:8080
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://core-airflow-webserver:8080/execution/
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@core-postgres:5432/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@core-postgres:5432/airflow
      AIRFLOW__CORE__PLUGINS_FOLDER: /opt/airflow/plugins
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__INTERNAL_API_URL: http://core-airflow-webserver:8080
      AIRFLOW__DAG_PROCESSOR__REFRESH_INTERVAL: "30"
    volumes:
      - ../src:/opt/airflow/src
      - ../dags:/opt/airflow/dags
      - ../projects:/opt/airflow/projects
      - ../plugins:/opt/airflow/plugins
      - ../logs:/opt/airflow/logs
    command: >
      bash -lc "sed -i 's|^jwt_secret =.*|jwt_secret = ffengine_api_auth_jwt_secret_dev|' /opt/airflow/airflow.cfg && exec airflow dag-processor"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow-pgdata:
    name: ffengine-airflow-pgdata
