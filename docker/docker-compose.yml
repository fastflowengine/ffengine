version: '3.8'

services:
  postgres:
    container_name: core-postgres
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow_password
      POSTGRES_DB: airflow
    ports:
      - "5436:5432"

  airflow-init:
    container_name: core-airflow-init
    build:
      context: ../
      dockerfile: docker/Dockerfile
    environment:
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@core-postgres:5432/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@core-postgres:5432/airflow
    command: db migrate
    depends_on:
      - postgres

  airflow-webserver:
    container_name: core-airflow-webserver
    build:
      context: ../
      dockerfile: docker/Dockerfile
    environment:
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@core-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@core-postgres:5432/airflow
      AIRFLOW__CORE__PLUGINS_FOLDER: /opt/airflow/plugins
    ports:
      - "8085:8080"
    volumes:
      - ../src:/opt/airflow/src
      - ../dags:/opt/airflow/dags
      - ../plugins:/opt/airflow/plugins
      - ../logs:/opt/airflow/logs
    command: api-server
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    container_name: core-airflow-scheduler
    build:
      context: ../
      dockerfile: docker/Dockerfile
    environment:
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@core-postgres:5432/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@core-postgres:5432/airflow
      AIRFLOW__CORE__PLUGINS_FOLDER: /opt/airflow/plugins
    volumes:
      - ../src:/opt/airflow/src
      - ../dags:/opt/airflow/dags
      - ../plugins:/opt/airflow/plugins
      - ../logs:/opt/airflow/logs
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    container_name: core-airflow-dag-processor
    build:
      context: ../
      dockerfile: docker/Dockerfile
    environment:
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@core-postgres:5432/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@core-postgres:5432/airflow
      AIRFLOW__CORE__PLUGINS_FOLDER: /opt/airflow/plugins
    volumes:
      - ../src:/opt/airflow/src
      - ../dags:/opt/airflow/dags
      - ../plugins:/opt/airflow/plugins
      - ../logs:/opt/airflow/logs
    command: dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
